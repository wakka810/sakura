name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.86.0"
  NODE_VERSION: "24"

jobs:
  test:
    name: Format and test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Set up Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal --component rustfmt --target wasm32-unknown-unknown
          rustup default "$RUST_VERSION"
          rustc --version
          cargo --version

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_VERSION }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: npm run test:ci

      - name: Upload WASM artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: sakura-core-wasm
          path: web/pkg/sakura_core.wasm
          if-no-files-found: error
          retention-days: 7
