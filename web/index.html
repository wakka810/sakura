<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Sakura BGI Browser Runtime</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="runtime-shell">
      <section class="stage" aria-label="BGI render stage">
        <canvas id="stage" width="1280" height="720"></canvas>
      </section>
      <aside class="panel" aria-label="Runtime controls">
        <div class="status">
          <span class="label">Core</span>
          <strong id="core-status">loading</strong>
        </div>
        <button id="open-install" type="button">Open local install</button>
        <div class="session-actions" aria-label="Session actions">
          <button id="save-session" type="button">Save</button>
          <button id="load-session" type="button">Load</button>
        </div>
        <button id="play-audio" type="button" disabled>Play queued audio</button>
        <input id="install-files" type="file" webkitdirectory multiple hidden />
        <pre id="probe-output" aria-live="polite"></pre>
      </aside>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
